name: Generate Assets
on:
  workflow_dispatch:
    inputs:
      problem:
        description: 'Viral Problem'
        required: true
        default: 'Digital Burnout'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requests
        run: pip install requests
      - name: Run AI Generation
        run: python scripts/generate_assets.py
        env:
          PROBLEM: ${{ github.event.inputs.problem }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          PDFMONKEY_API_KEY: ${{ secrets.PDFMONKEY_API_KEY }}
          HF_API_KEY: ${{ secrets.HF_API_KEY }}
      - name: Create Landing
        run: python scripts/create_landing.py
        env:
          PROBLEM: ${{ github.event.inputs.problem }}
      - name: Upload Kit
        uses: actions/upload-artifact@v4
        with:
          name: ai-product-kit
          path: assets/
      - name: Deploy Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
      - name: Notify Telegram
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TG_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TG_CHAT_ID }} \
          -d parse_mode=HTML \
          -d text="✅ <b>Producto listo para:</b> ${{ github.event.inputs.problem }}%0A🌐 Landing: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}%0A📦 Descarga assets en Actions → Artifacts"
